# PID Optimization Study — Configuration
# This file governs all three sub-studies: proxy-based box scan,
# fit-based box scan, and MVA with PID features.

[fitting]
argus_endpoint_offset = 200.0
bin_width = 5.0
use_binned_fit = true

[mass_windows]
b_high_sideband = [5330.0, 5410.0]
b_low_sideband = [5150.0, 5230.0]
bu_corrected = [5255.0, 5305.0]
charmonium_fit_range = [2800.0, 4000.0]

[mva]
# Three feature sets used in mva_pid_study.py
features_baseline = ["Bu_DTF_chi2", "Bu_FDCHI2_OWNPV", "Bu_IPCHI2_OWNPV", "Bu_PT"]
features_individual = [
  "Bu_DTF_chi2",
  "Bu_FDCHI2_OWNPV",
  "Bu_IPCHI2_OWNPV",
  "Bu_PT",
  "p_ProbNNp",
  "h1_ProbNNk",
  "h2_ProbNNk"
]
features_product = [
  "Bu_DTF_chi2",
  "Bu_FDCHI2_OWNPV",
  "Bu_IPCHI2_OWNPV",
  "Bu_PT",
  "PID_product"
]
random_state = 42
test_size = 0.3

[mva.hyperparameters]
colsample_bytree = 0.788
eval_metric = "logloss"
gamma = 1.225
learning_rate = 0.0518
max_depth = 6
min_child_weight = 1
n_estimators = 350
subsample = 0.792

[paths]
# Relative to the analysis/ directory (one level above studies/)
data_base_path = "/share/lazy/Mohamed/Bu2LambdaPPP/files/data"
magnets = ["MD", "MU"]
mc_base_path = "/share/lazy/Mohamed/Bu2LambdaPPP/files/mc"
mc_states = ["jpsi", "etac", "chic0", "chic1"]
track_types = ["LL", "DD"]
years = ["2016", "2017", "2018"]

[pdg]
masses = {jpsi = 3096.9, etac_1s = 2984.1, chic0 = 3414.71, chic1 = 3510.67, etac_2s = 3637.8}
widths = {jpsi = 0.0926, etac_1s = 30.5, chic0 = 10.6, chic1 = 0.88, etac_2s = 11.6}

[pid_grids]
h1_probnnk_max = 0.80
h1_probnnk_min = 0.05
h1_probnnk_step = 0.05
h2_probnnk_max = 0.80
h2_probnnk_min = 0.05
h2_probnnk_step = 0.05
p_probnnp_max = 0.80
p_probnnp_min = 0.05
p_probnnp_step = 0.05
pid_product_max = 0.50
# Scan grids for each variable (min, max, step)
# Product: finer grid to see the transition clearly
pid_product_min = 0.00
pid_product_step = 0.05

[pid_variables]
# Individual PID variables (MC15TuneV1 for both data and MC)
individual = ["p_ProbNNp", "h1_ProbNNk", "h2_ProbNNk"]
product = "PID_product"  # = p_ProbNNp * h1_ProbNNk * h2_ProbNNk

[signal_regions.chic0]
center = 3414.71
window = 21.0

[signal_regions.chic1]
center = 3510.67
window = 20.0

[signal_regions.etac]
center = 2983.9
window = 64.0

[signal_regions.etac_2s]
center = 3637.8
window = 23.2

[signal_regions.jpsi]
center = 3096.916
window = 15.0
