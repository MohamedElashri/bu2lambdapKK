[xgboost]
# PID variables (p_ProbNNp, h1_ProbNNk, h2_ProbNNk) have been removed.
# All proxy-based PID FOMs are anti-correlated with the fit-based FOM (r = -0.90)
# because sideband backgrounds consist of real, well-identified particles.
# PID is handled as a fixed pre-cut (PID_product > 0.20) applied in load_and_preprocess().
# See studies/pid_proxy_comparison/ for the full investigation.
features = [
  "Bu_DTF_chi2",
  "Bu_FDCHI2_OWNPV",
  "Bu_IPCHI2_OWNPV",
  "Bu_PT"
]
random_state = 42
test_size = 0.3

[xgboost.hyperparameters]
colsample_bytree = 0.788
eval_metric = "logloss"
gamma = 1.225
learning_rate = 0.0518
max_depth = 6
min_child_weight = 1
n_estimators = 350
subsample = 0.792
