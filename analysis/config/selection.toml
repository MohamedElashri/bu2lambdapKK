[baseline_selection]
# Cuts applied during initial data tuple reduction (required for consistency in MC)
bu_fdchi2_min = 175.0
bu_ipchi2_max = 10.0
bu_pt_min = 3000.0
h1_h2_probnnk_prod_min = 0.05
p_probnnp_min = 0.05

[cut_application]
# Set the desired optimization type ("box" or "mva")
optimization_type = "mva"
use_pretrained_mva = true

[fitting]
argus_endpoint_offset = 200.0
bin_width = 5.0
use_binned_fit = true

[fixed_selection]
# Variables fixed outside the ND optimizer (validated by fit_based_optimizer study).
# PID proxy optimization is fundamentally broken (see studies/pid_proxy_comparison).
# PID > 0.25 is applied as a hard pre-cut; fit-based FOM (MC15TuneV1, 2026-04-10 study)
# finds optimal product cut = 0.250 for both LL and DD.  Prior value was 0.20 from
# the fit_based_optimizer study which used MC12TuneV4 for MC (incorrect tune).
pid_product_min = 0.25

[lambda_selection]
delta_z_min_dd = 5.0
# Category-aware Delta_Z cuts (applied per track type in clean_data_loader.py)
# LL: tight cut to reject fake Lambda candidates (reference analysis uses 20 mm)
# DD: loose cut; downstream FD chi2 is more discriminating for downstream tracks
delta_z_min_ll = 20.0
# Lambda FD chi2: lowered from 250 to 50 (stripping minimum ~12).
# The optimizer now scans this variable; 250 was previously baked in at pre-selection
# level creating circular logic. The optimal value will be found by the ND scan.
fd_chisq_min = 50.0
mass_max = 1121.0
mass_min = 1111.0
proton_probnnp_min = 0.3

[mass_windows]
bu_corrected = [5255.0, 5305.0]
charmonium_fit_range = [2800.0, 4000.0]

[mva_thresholds]
dd_high_yield = 0.08
dd_low_yield = 0.32
# Frozen thresholds from mva_optimization study (fit-based 2D FOM scan,
# studies/generated/output/studies/mva_optimization/tables/).
# When use_pretrained_mva = true, optimize_selection.py uses these values directly
# and skips the proxy-based threshold scan, preserving the frozen analysis state.
ll_high_yield = 0.10
ll_low_yield = 0.27

[nd_optimizable_selection.bu_dtf_chi2]
begin = 10.0
branch_name = "Bu_DTF_chi2"
cut_type = "less"
end = 30.0
step = 5.0

[nd_optimizable_selection.bu_fdchi2]
begin = 175.0
branch_name = "Bu_FDCHI2_OWNPV"
cut_type = "greater"
end = 300.0
step = 10.0

[nd_optimizable_selection.bu_pt]
begin = 3000.0
branch_name = "Bu_PT"
cut_type = "greater"
end = 4000.0
step = 200.0

# Lambda FD chi2 added to ND scan (was previously hard-coded at 250 in pre-selection)
[nd_optimizable_selection.lambda_fdchi2]
begin = 50.0
branch_name = "L0_FDCHI2_OWNPV"
cut_type = "greater"
end = 300.0
step = 50.0

# log(IP chi2) replaces the raw IP chi2 scan — more uniform distribution in
# the sensitive region, finer effective granularity near the optimal cut.
# log(4) ≈ 1.39, log(10) ≈ 2.30; previous optimal was IP chi2 < 7 → log(7) ≈ 1.95
[nd_optimizable_selection.log_bu_ipchi2]
begin = 0.5
branch_name = "log_Bu_IPCHI2"
cut_type = "less"
end = 2.5
step = 0.1

[optimization_strategy]
b_high_sideband_max = 5410.0
b_high_sideband_min = 5330.0
b_low_sideband_max = 5230.0
b_low_sideband_min = 5150.0
b_signal_region_max = 5305.0
b_signal_region_min = 5255.0
charmonium_region_max = 3800.0
charmonium_region_min = 2900.0
method = "mc_based_sequential"
no_charmonium_mass_max = 6000.0
no_charmonium_mass_min = 4000.0
seq_step1_vars = ["bu_dtf_chi2", "bu_fdchi2", "log_bu_ipchi2"]
seq_step2_vars = ["bu_pt"]
# NOTE: pid_product removed — no [nd_optimizable_selection.pid_product] section exists,
# and proxy-based PID optimization is fundamentally broken (see
# studies/standalone/pid_optimization_study/).
# PID is handled either as a fixed pre-cut (pid_product_min = 0.25 above) or via the
# standalone fit-based optimizer in studies/standalone/pid_optimization_study/scripts/fit_based_scan.py.
signal_scale_factor = 10000.0
state_dependent = false

[pdg]
masses = {jpsi = 3096.9, etac_1s = 2984.1, chic0 = 3414.71, chic1 = 3510.67, etac_2s = 3637.8}
widths = {jpsi = 0.0926, etac_1s = 30.5, chic0 = 10.6, chic1 = 0.88, etac_2s = 11.6}

[signal_regions.chic0]
center = 3414.71
window = 21.0

[signal_regions.chic1]
center = 3510.67
window = 20.0

[signal_regions.etac]
center = 2983.9
window = 64.0

[signal_regions.etac_2s]
center = 3637.8
window = 23.2

[signal_regions.jpsi]
center = 3096.916
window = 15.0

[xgboost]
# Legacy section name retained for compatibility with the current scripts.
# The active production artifact is a CatBoost model, but the feature list and
# random-seed settings are still read from this `[xgboost]` block.
# PID_product (= p_ProbNNp * h1_ProbNNk * h2_ProbNNk) is included as a BDT feature.
# A fixed floor cut of pid_product_min = 0.25 (above) is applied before BDT evaluation,
# so the BDT optimises within [0.25, 1.0]. The sideband proxy bias is mitigated by
# the floor cut: in the restricted range the proxy bias is conservative rather than
# sign-reversed. Trained models (catboost_bdt_LL.cbm, catboost_bdt_DD.cbm) use exactly
# these 5 features; any change here invalidates the pre-trained models.
features = [
  "Bu_DTF_chi2",
  "Bu_FDCHI2_OWNPV",
  "Bu_IPCHI2_OWNPV",
  "Bu_PT",
  "PID_product"
]
random_state = 42
test_size = 0.3

[xgboost.hyperparameters]
colsample_bytree = 0.788
eval_metric = "logloss"
gamma = 1.225
learning_rate = 0.0518
max_depth = 6
min_child_weight = 1
n_estimators = 350
subsample = 0.792
