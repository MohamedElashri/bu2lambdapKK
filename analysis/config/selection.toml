[baseline_selection]
# Cuts applied during initial data tuple reduction (required for consistency in MC)
bu_fdchi2_min = 175.0
bu_ipchi2_max = 10.0
bu_pt_min = 3000.0
h1_h2_probnnk_prod_min = 0.05
p_probnnp_min = 0.05

[cut_application]
# Set the desired optimization type ("box" or "mva")
optimization_type = "mva"
use_pretrained_mva = true

[fitting]
argus_endpoint_offset = 200.0
bin_width = 5.0
use_binned_fit = true

[lambda_selection]
delta_z_min = 5.0
fd_chisq_min = 250.0
mass_max = 1121.0
mass_min = 1111.0
proton_probnnp_min = 0.3

[mass_windows]
bu_corrected = [5255.0, 5305.0]
charmonium_fit_range = [2800.0, 4000.0]

[nd_optimizable_selection.bu_dtf_chi2]
begin = 10.0
branch_name = "Bu_DTF_chi2"
cut_type = "less"
end = 30.0
step = 5.0

[nd_optimizable_selection.bu_fdchi2]
begin = 175.0
branch_name = "Bu_FDCHI2_OWNPV"
cut_type = "greater"
end = 300.0
step = 10.0

[nd_optimizable_selection.bu_ipchi2]
begin = 4.0
branch_name = "Bu_IPCHI2_OWNPV"
cut_type = "less"
end = 10.0
step = 0.25

[nd_optimizable_selection.bu_pt]
begin = 3000.0
branch_name = "Bu_PT"
cut_type = "greater"
end = 4000.0
step = 200.0

[nd_optimizable_selection.pid_product]
begin = 0.1
branch_name = "PID_product"
cut_type = "greater"
end = 0.8
step = 0.25

[optimization_strategy]
b_high_sideband_max = 5410.0
b_high_sideband_min = 5330.0
b_low_sideband_max = 5230.0
b_low_sideband_min = 5150.0
b_signal_region_max = 5305.0
b_signal_region_min = 5255.0
charmonium_region_max = 3800.0
charmonium_region_min = 2900.0
method = "mc_based_sequential"
no_charmonium_mass_max = 6000.0
no_charmonium_mass_min = 4000.0
seq_step1_vars = ["bu_dtf_chi2", "bu_fdchi2", "bu_ipchi2"]
seq_step2_vars = ["bu_pt", "pid_product"]
signal_scale_factor = 10000.0
state_dependent = false

[pdg]
masses = {jpsi = 3096.9, etac_1s = 2984.1, chic0 = 3414.71, chic1 = 3510.67, etac_2s = 3637.8}
widths = {jpsi = 0.0926, etac_1s = 30.5, chic0 = 10.6, chic1 = 0.88, etac_2s = 11.6}

[signal_regions.chic0]
center = 3414.71
window = 21.0

[signal_regions.chic1]
center = 3510.67
window = 20.0

[signal_regions.etac]
center = 2983.9
window = 64.0

[signal_regions.etac_2s]
center = 3637.8
window = 23.2

[signal_regions.jpsi]
center = 3096.916
window = 15.0

[xgboost]
features = [
  "Bu_DTF_chi2",
  "Bu_FDCHI2_OWNPV",
  "Bu_IPCHI2_OWNPV",
  "Bu_PT",
  "p_ProbNNp",
  "h1_ProbNNk",
  "h2_ProbNNk"
]
random_state = 42
test_size = 0.3

[xgboost.hyperparameters]
colsample_bytree = 0.788
eval_metric = "logloss"
gamma = 1.225
learning_rate = 0.0518
max_depth = 6
min_child_weight = 1
n_estimators = 350
subsample = 0.792
